<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="starGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle pattern dots -->
  <g opacity="0.06">
    <circle cx="80" cy="80" r="4" fill="white"/>
    <circle cx="160" cy="60" r="3" fill="white"/>
    <circle cx="432" cy="96" r="4" fill="white"/>
    <circle cx="400" cy="432" r="3" fill="white"/>
    <circle cx="96" cy="400" r="3" fill="white"/>
    <circle cx="256" cy="48" r="2" fill="white"/>
  </g>

  <!-- Star -->
  <g transform="translate(256, 148)">
    <circle cx="0" cy="0" r="36" fill="url(#starGlow)" opacity="0.15"/>
    <path d="M0,-28 L6.5,-9 L26.5,-9 L10.5,3 L16,22 L0,11 L-16,22 L-10.5,3 L-26.5,-9 L-6.5,-9 Z" fill="url(#starGlow)"/>
  </g>

  <!-- Open Book -->
  <g transform="translate(256, 310)">
    <!-- Book shadow -->
    <ellipse cx="0" cy="68" rx="90" ry="10" fill="black" opacity="0.08"/>
    
    <!-- Left page -->
    <path d="M-4,-60 L-4,60 C-4,60 -75,52 -90,45 L-90,-55 C-75,-48 -4,-60 -4,-60 Z" fill="url(#book)" opacity="0.9"/>
    
    <!-- Right page -->
    <path d="M4,-60 L4,60 C4,60 75,52 90,45 L90,-55 C75,-48 4,-60 4,-60 Z" fill="url(#book)" opacity="0.9"/>
    
    <!-- Spine -->
    <rect x="-4" y="-60" width="8" height="120" rx="2" fill="#ffffff" opacity="0.95"/>
    
    <!-- Center fold line -->
    <line x1="0" y1="-58" x2="0" y2="58" stroke="#cbd5e1" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Text lines on left page -->
    <g stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.25">
      <line x1="-70" y1="-32" x2="-20" y2="-32"/>
      <line x1="-70" y1="-18" x2="-20" y2="-18"/>
      <line x1="-70" y1="-4" x2="-20" y2="-4"/>
      <line x1="-70" y1="10" x2="-35" y2="10"/>
    </g>

    <!-- Text lines on right page -->
    <g stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.25">
      <line x1="20" y1="-32" x2="70" y2="-32"/>
      <line x1="20" y1="-18" x2="70" y2="-18"/>
      <line x1="20" y1="-4" x2="70" y2="-4"/>
      <line x1="20" y1="10" x2="55" y2="10"/>
    </g>

    <!-- Book bottom edge -->
    <path d="M-4,60 L-90,45" stroke="#cbd5e1" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M4,60 L90,45" stroke="#cbd5e1" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>
</svg>